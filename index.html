// --- 3D SCENE ---
function ShoeModel() {
  const group = useRef();
  const { scrollYProgress } = useFramerScroll();
  const { scene } = useGLTF('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/MaterialsVariantsShoe/glTF/MaterialsVariantsShoe.gltf');
  
  useFrame((state) => {
    const t = state.clock.getElapsedTime();
    group.current.position.y = (Math.sin(t / 1.5) / 10) - 0.5;
    const targetRotationY = scrollYProgress.get() * Math.PI * 2;
    group.current.rotation.y = THREE.MathUtils.lerp(group.current.rotation.y, targetRotationY, 0.1);
    const mouseX = (state.mouse.x * Math.PI) / 10;
    const mouseY = (state.mouse.y * Math.PI) / 10;
    group.current.rotation.x = THREE.MathUtils.lerp(group.current.rotation.x, -mouseY, 0.1);
    group.current.rotation.z = THREE.MathUtils.lerp(group.current.rotation.z, -mouseX, 0.1);
  });

  return (
    <group ref={group} dispose={null} scale={15} position={[0, -0.5, 0]}>
      <mesh position={[0, -0.05, 0]} rotation={[-Math.PI/2, 0, 0]}>
        <ringGeometry args={[0.15, 0.16, 64]} />
        <meshBasicMaterial color="#ffffff" transparent opacity={0.5} />
      </mesh>
      <primitive object={scene} />
    </group>
  );
}

function Scene() {
  return (
    <Canvas camera={{ position: [0, 0, 6], fov: 45 }}>
      <ambientLight intensity={0.8} />
      <spotLight position={[10, 10, 10]} angle={0.15} penumbra={1} intensity={1} castShadow />
      <Suspense fallback={null}>
        <ShoeModel />
        <Environment preset="studio" />
        <ContactShadows position={[0, -1.5, 0]} opacity={0.6} scale={15} blur={2.5} far={4} />
      </Suspense>
    </Canvas>
  );
}

function FadeIn({ children, delay = 0 }) {

      viewport={{ once: true, margin: "-100px" }}
      transition={{ duration: 0.8, delay }}

      {children}
    </motion.div>
  );
}

              <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"/></svg>

              <svg width="20" height="20" viewBox="0 0 384 512"><path fill="currentColor" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
              Continue with Apple

            <button className="auth-btn" onClick={() => { alert('Outlook Auth Mock successful!'); setAuthOpen(false); }}>
              <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#0072C6" d="M12 0L0 2.2V21.8L12 24V0Z"/><path fill="#004C84" d="M24 4.5V19.5L12 22V2L24 4.5Z"/><path fill="#FFF" d="M12 7.5L5 10V14L12 16.5V7.5ZM13 7.5V16.5L20 14V10L13 7.5Z"/></svg>

          <>
            <h2 className="modal-title">Verify Phone</h2>
            <p style={{ color: 'var(--text-secondary)', marginBottom: '20px' }}>Enter the 4-digit code sent to your phone.</p>
            <input type="text" className="auth-input" placeholder="1 2 3 4" style={{ textAlign: 'center', fontSize: '1.5rem', letterSpacing: '10px' }} />
            <button className="auth-submit" onClick={() => { alert('Phone Verified Successfully!'); setAuthOpen(false); setStep('login'); }}>Verify & Login</button>
          </>

      </div>
    </div>
  );
}

function CheckoutModal() {
  const { checkoutOpen, setCheckoutOpen, cartItems } = useStore();
  const [processing, setProcessing] = useState(false);
  if (!checkoutOpen) return null;
  const handlePay = () => {
    setProcessing(true);
    setTimeout(() => {
      setProcessing(false);
      alert('Payment Successful! Thank you for your order.');
      setCheckoutOpen(false);
    }, 2000);
  };
  return (
    <div className="modal-overlay">
      <div className="modal-content">
        <button className="modal-close" onClick={() => setCheckoutOpen(false)}>×</button>
        <h2 className="modal-title">Secure Checkout</h2>
        <p style={{ marginBottom: '20px', color: 'var(--text-secondary)' }}>Total to pay: <strong>${cartItems.reduce((acc, item) => acc + item.price, 0)}.00</strong></p>
        <div style={{ textAlign: 'left', marginBottom: '20px' }}>
          <label style={{ display: 'block', marginBottom: '8px', color: 'var(--text-secondary)' }}>Card Number</label>
          <input type="text" className="auth-input" placeholder="0000 0000 0000 0000" />
          <div style={{ display: 'flex', gap: '15px' }}>
            <div style={{ flex: 1 }}>
              <label style={{ display: 'block', marginBottom: '8px', color: 'var(--text-secondary)' }}>Expiry</label>
              <input type="text" className="auth-input" placeholder="MM/YY" />
            </div>
            <div style={{ flex: 1 }}>
              <label style={{ display: 'block', marginBottom: '8px', color: 'var(--text-secondary)' }}>CVC</label>
              <input type="text" className="auth-input" placeholder="123" />
            </div>
          </div>
        </div>
        <button className="auth-submit" onClick={handlePay}>
          {processing ? 'Processing...' : 'Pay Now'}
        </button>
      </div>
    </div>
  );
}

function App() {
  const currentView = useStore(state => state.currentView);
  return (
    <>
      <Header />
      <CartSidebar />
      <AuthModal />
      <CheckoutModal />
      <AnimatePresence mode="wait">
        {currentView === 'home' && <motion.div key="home" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}><HomeView /></motion.div>}
        {currentView === 'shop' && <motion.div key="shop" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}><ShopView /></motion.div>}
        {currentView === 'about' && <motion.div key="about" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}><AboutView /></motion.div>}
        {currentView === 'contact' && <motion.div key="contact" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}><ContactView /></motion.div>}
      </AnimatePresence>
      <Footer />
    </>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
